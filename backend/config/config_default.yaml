# General Application Settings
general:
  manufacturer: "mowbot"      # Default manufacturer for VDA5050 topics
  serial_number: "default"    # Default serial if not specified
  language: "en"              # Initial UI language (en/ko)
  
  # Map Configuration for the Frontend
  map:
    style: "default"          # "default" (Carto Light) or "satellite"
    mapbox_api_key: ""        # Required for satellite view
    default_zoom: 15          # Initial zoom level
    heading_offset: 0.0       # Correction for projection distortion

# MQTT Broker Settings
# Note: In production, these are often overridden by encrypted DB or Env Vars
broker:
  host: "localhost"           # MQTT broker hostname
  port: 1883                  # MQTT broker port (8883 for HiveMQ TLS)
  use_tls: false              # Set to true for HiveMQ Cloud
  user: ""                    # MQTT username
  password: ""                # MQTT password

# Mission and VDA5050 Logic Constraints
mission:
  default_order_prefix: "ORDER" # Prefix for auto-generated IDs
  max_nodes: 50                 # Maximum waypoints per mission
  min_node_distance: 0.0        # Minimum distance between waypoints (0.0 to disable)